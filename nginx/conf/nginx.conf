user mamun mamun;
worker_processes auto;
error_log /home/mamun/webstack/nginx/logs/error.log warn;
pid /home/mamun/webstack/tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include mime.types;
    default_type application/octet-stream;
    
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    
    access_log /home/mamun/webstack/nginx/logs/access.log main;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 100M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types application/javascript application/json text/css text/plain text/xml image/svg+xml application/xml;
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    
    # Push stream (SSE)
    push_stream_shared_memory_size 64M;
    
    # Upstreams
    upstream php-fpm {
        server unix:/home/mamun/webstack/tmp/php-fpm.sock;
    }
    
    upstream nodejs {
        server 127.0.0.1:3000;
    }
    
    upstream websocket {
        server 127.0.0.1:8081;
    }
    
    # HTTP Server
    server {
        listen 80;
        server_name localhost _;
        root /home/mamun/webstack/www;
        index index.php index.html;
        
        # Main location
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
        
        # PHP handling
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            fastcgi_read_timeout 300;
        }
        
        # Node.js API proxy
        location /api/ {
            proxy_pass http://nodejs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }
        
        # WebSocket proxy
        location /ws {
            proxy_pass http://websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 86400;
        }
        
        # Server-Sent Events (Push Stream)
        location /sse/sub {
            push_stream_subscriber;
            push_stream_channels_path $arg_channel;
            push_stream_message_template ~text~;
            default_type text/event-stream;
        }
        
        location /sse/pub {
            push_stream_publisher admin;
            push_stream_channels_path $arg_channel;
        }
        
        # HLS streaming
        location /hls {
            alias /home/mamun/webstack/www/hls;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }
        
        # Status pages
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
        
        # Security - deny hidden files
        location ~ /\. {
            deny all;
        }
    }
    
    # HTTPS Server
    server {
        listen 443 ssl;
        listen 443 quic reuseport;
        http2 on;
        server_name localhost _;
        
        ssl_certificate /home/mamun/webstack/nginx/conf/ssl/cert.pem;
        ssl_certificate_key /home/mamun/webstack/nginx/conf/ssl/key.pem;
        
        # HTTP/3 advertisement
        add_header Alt-Svc 'h3=":443"; ma=86400';
        
        root /home/mamun/webstack/www;
        index index.php index.html;
        
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }
        
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTPS on;
            include fastcgi_params;
        }
        
        location /api/ {
            proxy_pass http://nodejs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
        }
        
        location /ws {
            proxy_pass http://websocket;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400;
        }
        
        location /hls {
            alias /home/mamun/webstack/www/hls;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }
        
        location /nginx_status {
            stub_status on;
            allow 127.0.0.1;
            deny all;
        }
        
        location ~ /\. {
            deny all;
        }
    }
    
    include conf.d/*.conf;
}

# RTMP Configuration
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        # Live streaming application
        application live {
            live on;
            record off;
            
            # HLS output
            hls on;
            hls_path /home/mamun/webstack/www/hls;
            hls_fragment 3;
            hls_playlist_length 60;
            hls_cleanup on;
            
            # Optional: recording
            # record all;
            # record_path /home/mamun/webstack/www/recordings;
            # record_suffix _%Y%m%d_%H%M%S.flv;
        }
        
        # Video on Demand
        application vod {
            play /home/mamun/webstack/www/videos;
        }
    }
}

# RTMPS (SSL proxy to RTMP)
stream {
    server {
        listen 1936 ssl;
        ssl_certificate /home/mamun/webstack/nginx/conf/ssl/cert.pem;
        ssl_certificate_key /home/mamun/webstack/nginx/conf/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        proxy_pass 127.0.0.1:1935;
    }
}
