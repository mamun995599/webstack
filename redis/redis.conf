# Redis Configuration
bind 127.0.0.1
port 6379
daemonize yes
pidfile /home/mamun/webstack/tmp/redis.pid
logfile /home/mamun/webstack/logs/redis.log
dir /home/mamun/webstack/data/redis
dbfilename dump.rdb

# Memory
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence
save 900 1
save 300 10
save 60 10000

# Security (uncomment and set password)
# requirepass your_password_here
