# Redis Configuration for WebStack
# Generated: Fri Feb 27 02:02:21 PM +06 2026

# Network
bind 127.0.0.1
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# General
daemonize yes
pidfile /home/mamun/webstack/tmp/redis.pid
loglevel notice
logfile /home/mamun/webstack/logs/redis.log

# Snapshotting
dir /home/mamun/webstack/data/redis
dbfilename dump.rdb
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes

# Memory Management
maxmemory 128mb
maxmemory-policy allkeys-lru

# Append Only Mode (optional, more durable)
appendonly no
appendfilename "appendonly.aof"

# Security (uncomment and set password for production)
# requirepass your_secure_password_here

# Clients
maxclients 100

# Slow Log
slowlog-log-slower-than 10000
slowlog-max-len 128
