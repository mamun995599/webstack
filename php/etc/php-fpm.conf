[global]
pid = /home/mamun/webstack/php/var/run/php-fpm.pid
error_log = /home/mamun/webstack/php/var/log/php-fpm.log
daemonize = yes

[www]
listen = /home/mamun/webstack/tmp/php-fpm.sock
listen.owner = mamun
listen.group = mamun
listen.mode = 0666

user = mamun
group = mamun

pm = dynamic
pm.max_children = 25
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.max_requests = 500

catch_workers_output = yes
php_admin_value[error_log] = /home/mamun/webstack/php/var/log/php-error.log
php_admin_flag[log_errors] = on
